<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TEAM JXLL - Cargando...</title>

  <style>
    /* ====== LOADER ====== */

    /* Pantalla completa */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Contenedor del logo */
    .logo-container {
      width: 180px;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Logo girando */
    .logo-spin {
      width: 150px;
      animation: spin 2s linear infinite;
    }

    /* Animación 360° */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Barra de carga */
    .loading-bar {
      width: 60%;
      height: 6px;
      background: #222;
      margin-top: 40px;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Progreso animado */
    .loading-progress {
      width: 0%;
      height: 100%;
      background: red;
      animation: load 3s ease-in-out forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    /* Ocultar loader */
    .fade-out {
      opacity: 0;
      transition: opacity 0.6s ease-out;
      pointer-events: none;
    }

    /* ====== CONTENIDO REAL DE LA PÁGINA ====== */
    body {
      background: black;
      color: white;
      font-family: monospace;
      text-align: center;
      padding-top: 100px;
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="logo-container">
      <img src="favicon.png" class="logo-spin">
    </div>

    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
  </div>

  <!-- CONTENIDO REAL (puedes cambiarlo o dejarlo vacío) -->
  <h1>Bienvenido a TEAM JXLL</h1>
  <p>El sistema ha cargado correctamente.</p>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader");
      loader.classList.add("fade-out");

      setTimeout(() => {
        loader.style.display = "none";
      }, 600);
    });
  </script>

</body>
</html>
