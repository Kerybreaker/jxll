<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>TEAM JXLL — Perfil de Usuario</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

:root{
  --bg:#000000;
  --bg2:#080000;
  --bg3:#0d0000;
  --red:#8B0000;
  --red-neon:#FF0000;
  --red-mid:#CC0000;
  --smoke:#2C2C2C;
  --border:#2a0000;
  --border2:#3a0000;
  --offwhite:#E0E0E0;
  --muted:#808080;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  background:var(--bg);
  color:var(--offwhite);
  font-family:'Share Tech Mono','Courier New',monospace;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);
  pointer-events:none;z-index:9998;
}

#matrix-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;opacity:0.10;pointer-events:none;
}

.navbar{
  position:fixed;top:0;width:100%;z-index:100;
  background:rgba(0,0,0,0.97);
  border-bottom:1px solid var(--red);
  box-shadow:0 0 20px rgba(139,0,0,0.45);
  padding:9px 0;
}
.nav-container{
  max-width:1400px;margin:0 auto;padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;
}
.nav-logo{
  color:#FF0000;font-size:1em;letter-spacing:4px;font-weight:bold;
  text-shadow:0 0 10px #ff0000;
  animation:pRed 2.5s ease-in-out infinite;
  text-decoration:none;
}
@keyframes pRed{0%,100%{opacity:1;}50%{opacity:0.75;}}

.menu-toggle{
  display:block;background:none;border:1px solid var(--border2);
  color:#FF0000;padding:6px 13px;cursor:pointer;
  border-radius:2px;font-family:inherit;font-size:1em;
  transition:all 0.3s;
}
.menu-toggle:hover{background:rgba(255,0,0,0.1);}
@media(min-width:768px){.menu-toggle{display:none;}}

.nav-list{
  display:none;flex-direction:column;
  position:absolute;top:100%;left:0;right:0;
  background:#000;border-top:1px solid var(--border);
  z-index:99;padding:8px 0;list-style:none;
}
.nav-list.show{display:flex;}
@media(min-width:768px){
  .nav-list{display:flex!important;flex-direction:row;position:static;
    background:none;border:none;padding:0;}
}
.nav-list li{border-bottom:1px solid var(--border);width:100%;}
@media(min-width:768px){.nav-list li{border:none;width:auto;margin-right:4px;}}
.nav-list a{
  color:#8B0000;text-decoration:none;padding:10px 16px;
  display:block;letter-spacing:1px;font-size:0.78em;
  text-transform:uppercase;transition:all 0.3s;
}
@media(min-width:768px){.nav-list a{padding:5px 10px;display:inline;}}
.nav-list a:hover,.nav-list a.active{color:#FF0000;background:rgba(255,0,0,0.06);}

.container-main{
  position:relative;z-index:1;
  max-width:1000px;
  margin:0 auto;
  padding:80px 20px 40px;
}

.user-profile{
  display: block;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  animation: fadeIn 0.5s ease-out;
}

.profile-header-container{
  position:relative;
  margin-bottom:0;
  overflow:visible;
}
.profile-cover{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
  background:linear-gradient(135deg,#0a0000 0%,#3a0000 100%);
  filter:brightness(0.7);
}
.profile-avatar-container{
  position: absolute;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
}
.profile-avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #FF0000;
  background:var(--bg2);
  box-shadow:0 0 20px rgba(255,0,0,0.5);
  z-index: 10;
}
.profile-info{
  margin-top:70px;
  padding:0 24px 20px;
  text-align:center;
}
.profile-info h3{
  color:#FF0000;
  font-size:1.8em;
  border:none;
  padding:0;
  margin-bottom:8px;
  letter-spacing:2px;
}
.profile-info h3::after{display:none;}
.profile-info p{
  font-size:0.9em;
  color:#8B0000;
  letter-spacing:3px;
  margin-bottom:20px;
}

.profile-stats{
  display:flex;
  gap:20px;
  margin-top:10px;
  justify-content:center;
  flex-wrap: wrap;
}
.stat{
  text-align:center;
  background:var(--bg3);
  border:1px solid var(--border);
  padding:12px 25px;
  min-width:110px;
  box-shadow:0 0 8px rgba(255,0,0,0.1);
  border-radius: 4px;
}
.stat .stat-value{
  font-size:1.8em;
  font-weight:bold;
  display:block;
  color:#FF0000;
}
.stat-label{
  font-size:11px;
  color:#8B0000;
  letter-spacing:1px;
  margin-top:5px;
}

.profile-details{
  margin-top:30px;
  padding:0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 12px;
}
.detail-item{
  display:flex;
  flex-direction:column;
  background:var(--bg3);
  border:1px solid var(--border);
  padding:12px 16px;
  border-radius: 4px;
}
.detail-label{
  font-weight:bold;
  color:#8B0000;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  font-size:0.78em;
  letter-spacing:1px;
}
.detail-label::before{
  content:"▸";
  color:#FF0000;
  margin-right:6px;
}
.detail-value{
  color:var(--offwhite);
  font-size:0.85em;
  word-break:break-word;
  line-height:1.4;
}
.detail-value a{
  color:#FF0000;
  text-decoration:none;
}
.detail-value a:hover{text-decoration:underline;}
.detail-value strong{color:#FF0000;}

.social-links {
  display: flex;
  gap: 12px;
  justify-content: flex-start;
  margin-top: 8px;
  flex-wrap: wrap;
}
.social-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #8B0000;
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: all 0.3s;
  font-size: 0.75em;
}
.social-link:hover {
  color: #FF0000;
  border-color: #FF0000;
  transform: translateY(-2px);
}
.social-link i {
  font-size: 1em;
}

.profile-posts{
  margin-top:30px;
  padding:0 24px 30px;
}
.profile-posts h3{
  text-align: center;
  margin-bottom: 20px;
  font-size: 1.2em;
}
.posts-count{
  background:rgba(139,0,0,0.2);
  padding:4px 12px;
  display:inline-block;
  margin-left:10px;
  font-size:0.75em;
  color:#FF0000;
  border:1px solid var(--border2);
  border-radius: 4px;
}

.table-wrapper{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
#tabla-posts-user{
  width:100%;
  border-collapse:collapse;
  background:#050000;
  color:var(--offwhite);
  border:1px solid var(--red);
  box-shadow:0 0 10px rgba(255,0,0,0.15);
  min-width:500px;
}
#tabla-posts-user thead{
  background:var(--red);
  color:#000;
  text-transform:uppercase;
}
#tabla-posts-user thead th{
  padding:12px 10px;
  font-size:12px;
  letter-spacing:1px;
}
#tabla-posts-user tbody td{
  padding:10px;
  text-align:center;
  border-top:1px solid var(--border);
  font-size:13px;
}
#tabla-posts-user tbody tr:nth-child(even){background:#0a0000;}
#tabla-posts-user tbody tr:hover{background:#160000;}

.url-btn{
  background:rgba(139,0,0,0.15);
  border:1px solid #8B0000;
  color:#FF0000;
  padding:6px 14px;
  cursor:pointer;
  font-size:11px;
  font-family:inherit;
  letter-spacing:1px;
  transition:all 0.3s;
  border-radius:3px;
}
.url-btn:hover{
  background:rgba(255,0,0,0.2);
  box-shadow:0 0 8px rgba(255,0,0,0.3);
  transform:scale(1.02);
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  color: #8B0000;
  text-decoration: none;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: all 0.3s;
  font-size: 0.85em;
}
.back-link:hover {
  color: #FF0000;
  border-color: #FF0000;
  transform: translateX(-3px);
}

.loading {
  text-align: center;
  padding: 60px;
  color: #8B0000;
  font-size: 1.2em;
}
.loading i {
  font-size: 2em;
  margin-bottom: 15px;
  display: block;
}

.error {
  text-align: center;
  padding: 60px;
  color: #FF0000;
  font-size: 1.2em;
}
.error i {
  font-size: 2.5em;
  margin-bottom: 15px;
  display: block;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* Responsive */
@media (max-width: 768px) {
  .profile-avatar {
    width: 90px;
    height: 90px;
  }
  .profile-info h3 {
    font-size: 1.4em;
  }
  .stat {
    padding: 8px 15px;
    min-width: 80px;
  }
  .stat .stat-value {
    font-size: 1.4em;
  }
  .profile-details {
    grid-template-columns: 1fr;
  }
  .social-links {
    justify-content: center;
  }
}
</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<nav class="navbar">
  <div class="nav-container">
    <a class="nav-logo" href="https://jxll.org/">[ JXLL ]</a>
    <button class="menu-toggle" id="menuToggle">&#9776;</button>
    <ul class="nav-list" id="navList">
      <li><a href="https://jxll.org/">Inicio</a></li>
      <li><a href="https://jxll.org/Deloveper/0.0.0.html">Dev</a></li>
    </ul>
  </div>
</nav>

<div class="container-main">
  <a href="https://jxll.org/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
  
  <div id="profileContainer">
    <div class="loading">
      <i class="fas fa-spinner fa-spin"></i>
      Cargando perfil...
    </div>
  </div>
</div>

<script>
// ========== CONFIGURACIÓN ==========
const MOCKAPI_USERS_URL = 'https://69d75f459c5ebb0918c77973.mockapi.io/jxxl/dox/1809284927309381080812098492848102984098120840921/92019301920390129039120/Bsz/User';
const MOCKAPI_POSTS_URL = 'https://69d75f459c5ebb0918c77973.mockapi.io/jxxl/dox/1809284927309381080812098492848102984098120840921/92019301920390129039120/Bsz/post';

// ========== SANITIZACIÓN ==========
function sanitizeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function formatDescription(text) {
    if (!text || text === 'null') return 'Sin descripción';
    let sanitized = sanitizeHTML(text);
    let formatted = sanitized.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    formatted = formatted.replace(/\n/g, '<br>');
    return formatted;
}

// ========== EFECTO MATRIX ==========
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = 'JXLL01アイウエカキクケ10ABCDEF!@#$%<>?/|[]{}';
const fontSize = 13;
let drops = Array.from({ length: Math.floor(window.innerWidth / fontSize) }, () => Math.random() * -100);

function drawMatrix() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px "Courier New",monospace';
    drops.forEach((y, i) => {
        ctx.fillStyle = Math.random() > 0.95 ? '#FF0000' : '#8B0000';
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.4;
    });
}
setInterval(drawMatrix, 55);

// ========== NAVEGACIÓN ==========
const toggleBtn = document.getElementById('menuToggle');
const navList = document.getElementById('navList');
if (toggleBtn && navList) {
    toggleBtn.addEventListener('click', () => navList.classList.toggle('show'));
}

// ========== REDES SOCIALES ==========
function renderSocialLinks(social) {
    if (!social) return '';
    
    const networks = [
        { name: 'Instagram', icon: 'fa-brands fa-instagram', key: 'instagram', urlPrefix: 'https://instagram.com/' },
        { name: 'Twitter', icon: 'fa-brands fa-twitter', key: 'twitter', urlPrefix: 'https://twitter.com/' },
        { name: 'Facebook', icon: 'fa-brands fa-facebook', key: 'facebook', urlPrefix: 'https://facebook.com/' },
        { name: 'GitHub', icon: 'fa-brands fa-github', key: 'github', urlPrefix: 'https://github.com/' },
        { name: 'YouTube', icon: 'fa-brands fa-youtube', key: 'youtube', urlPrefix: 'https://youtube.com/@' },
        { name: 'TikTok', icon: 'fa-brands fa-tiktok', key: 'tiktok', urlPrefix: 'https://tiktok.com/@' },
        { name: 'Telegram', icon: 'fa-brands fa-telegram', key: 'telegram', urlPrefix: 'https://t.me/' },
        { name: 'Discord', icon: 'fa-brands fa-discord', key: 'discord', urlPrefix: '' }
    ];
    
    let html = '<div class="social-links">';
    let hasAnySocial = false;
    
    for (const network of networks) {
        let value = social[network.key];
        if (value && value !== 'null' && value !== '' && value !== 'undefined') {
            hasAnySocial = true;
            let url = '';
            if (network.key === 'discord') {
                url = value;
            } else if (value.startsWith('http')) {
                url = value;
            } else {
                url = network.urlPrefix + value.replace('@', '');
            }
            html += `<a href="${sanitizeHTML(url)}" target="_blank" rel="noopener noreferrer" class="social-link"><i class="${network.icon}"></i> ${sanitizeHTML(network.name)}</a>`;
        }
    }
    
    html += '</div>';
    return hasAnySocial ? html : '';
}

// ========== MOSTRAR PERFIL ==========
function showUserProfile(user) {
    const container = document.getElementById('profileContainer');
    if (!container) return;
    
    console.log('Mostrando perfil de:', user.name);
    
    // Obtener posts del usuario desde la API de posts
    let userPosts = [];
    
    // Función para renderizar el perfil una vez que tengamos los posts
    async function renderProfileWithPosts() {
        // Buscar posts de este usuario
        try {
            const postsRes = await fetch(MOCKAPI_POSTS_URL);
            const postsData = await postsRes.json();
            
            for (let i = 0; i < postsData.length; i++) {
                const item = postsData[i];
                if (item.postgeneral && Array.isArray(item.postgeneral)) {
                    for (let j = 0; j < item.postgeneral.length; j++) {
                        const post = item.postgeneral[j];
                        if (post && post['post-user'] === user.name && post['post-titulo'] && post['post-titulo'] !== 'null') {
                            userPosts.push(post);
                        }
                    }
                }
            }
        } catch (err) {
            console.error('Error cargando posts:', err);
        }
        
        // Ordenar posts por fecha (más reciente primero)
        userPosts.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        
        // Renderizar el HTML del perfil
        const avatarUrl = user.img && user.img !== 'null' ? sanitizeHTML(user.img) : 'https://files.catbox.moe/cqgdde.png';
        const coverUrl = user['url-portada'] && user['url-portada'] !== 'null' ? sanitizeHTML(user['url-portada']) : '';
        
        // Construir HTML de posts
        let postsHtml = '';
        if (userPosts.length === 0) {
            postsHtml = '<tr><td colspan="2" style="text-align:center;color:#555; padding:30px;">No hay posts disponibles</td></tr>';
        } else {
            userPosts.forEach(post => {
                postsHtml += `
                    <tr>
                        <td style="text-align:left; padding:12px;">${sanitizeHTML(post['post-titulo'])}</td>
                        <td>
                            ${post.shareLink && post.shareLink !== 'null' && post.shareLink !== '' ? 
                                `<button class="url-btn" onclick="window.open('${sanitizeHTML(post.shareLink)}', '_blank')"><i class="fas fa-external-link-alt"></i> Ver URL</button>` : 
                                '<span style="color:#555;">Sin URL</span>'}
                        </td>
                    </tr>
                `;
            });
        }
        
        const socialHtml = renderSocialLinks(user.social);
        
        const websiteHtml = (user.social && user.social.website && user.social.website !== 'null' && user.social.website !== '') ?
            `<a href="${user.social.website.startsWith('http') ? sanitizeHTML(user.social.website) : 'https://' + sanitizeHTML(user.social.website)}" target="_blank" rel="noopener noreferrer" style="color:#FF0000; text-decoration:underline;">${sanitizeHTML(user.social.website)}</a>` :
            '—';
        
        const profileHtml = `
            <div class="user-profile">
                <div class="profile-header-container">
                    ${coverUrl ? `<img src="${coverUrl}" alt="Portada" class="profile-cover" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#0a0000 0%,#3a0000 100%)'">` : '<div class="profile-cover" style="background:linear-gradient(135deg,#0a0000 0%,#3a0000 100%);"></div>'}
                    <div class="profile-avatar-container">
                        <img src="${avatarUrl}" class="profile-avatar" alt="Avatar" onerror="this.src='https://files.catbox.moe/cqgdde.png'">
                    </div>
                </div>
                <div class="profile-info">
                    <h3>${sanitizeHTML(user.name)}</h3>
                    <p>✦ TEAM JXLL ✦</p>
                    <div class="profile-stats">
                        <div class="stat"><span class="stat-value">${userPosts.length}</span><div class="stat-label">POSTS</div></div>
                        <div class="stat"><span class="stat-value">${user.seguidores || 0}</span><div class="stat-label">SEGUIDORES</div></div>
                        <div class="stat"><span class="stat-value">${user.seguidos || 0}</span><div class="stat-label">SEGUIDOS</div></div>
                    </div>
                </div>
                <div class="profile-details">
                    <div class="detail-item"><span class="detail-label">DESCRIPCIÓN</span><span class="detail-value">${formatDescription(user.descripcionuser)}</span></div>
                    <div class="detail-item"><span class="detail-label">ETIQUETAS</span><span class="detail-value">${sanitizeHTML(user.etiquetasuser) || '#Bsz'}</span></div>
                    <div class="detail-item"><span class="detail-label">GÉNERO</span><span class="detail-value">${(user.gender && user.gender !== 'null') ? sanitizeHTML(user.gender) : '—'}</span></div>
                    <div class="detail-item"><span class="detail-label">UBICACIÓN</span><span class="detail-value">${(user.location && user.location !== 'null') ? sanitizeHTML(user.location) : '—'}</span></div>
                    <div class="detail-item"><span class="detail-label">SITIO WEB</span><span class="detail-value">${websiteHtml}</span></div>
                    ${socialHtml ? `<div class="detail-item"><span class="detail-label">REDES SOCIALES</span><span class="detail-value">${socialHtml}</span></div>` : ''}
                </div>
                <div class="profile-posts">
                    <h3> PUBLICACIONES <span class="posts-count">${userPosts.length}</span></h3>
                    <div class="table-wrapper">
                        <table id="tabla-posts-user">
                            <thead>
                                <tr>
                                    <th>TÍTULO</th>
                                    <th>ENLACE</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${postsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        
        container.innerHTML = profileHtml;
    }
    
    renderProfileWithPosts();
}

// ========== OBTENER USUARIO DE LA URL ==========
function getUserFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('user');
}

// ========== BUSCAR USUARIO EN LA API ==========
async function buscarUsuarioPorNombre(nombre) {
    try {
        const response = await fetch(MOCKAPI_USERS_URL);
        const users = await response.json();
        console.log('Usuarios encontrados:', users.map(u => u.name));
        
        // Buscar por nombre exacto (case insensitive)
        const userFound = users.find(u => u.name.toLowerCase() === nombre.toLowerCase());
        return userFound;
    } catch (error) {
        console.error('Error al buscar usuario:', error);
        return null;
    }
}

// ========== CARGAR PERFIL ==========
async function cargarPerfil() {
    const container = document.getElementById('profileContainer');
    const userName = getUserFromURL();
    
    if (!userName) {
        container.innerHTML = `
            <div class="error">
                <i class="fas fa-exclamation-triangle"></i>
                No se especificó ningún usuario.<br>
                <span style="font-size:0.8em;">Usa el formato: ?user=nombreusuario</span>
            </div>
        `;
        return;
    }
    
    console.log('Buscando usuario:', userName);
    
    const user = await buscarUsuarioPorNombre(userName);
    
    if (!user) {
        container.innerHTML = `
            <div class="error">
                <i class="fas fa-user-slash"></i>
                Usuario "${sanitizeHTML(userName)}" no encontrado.
            </div>
        `;
        return;
    }
    
    showUserProfile(user);
}

// ========== INICIALIZACIÓN ==========
document.addEventListener('DOMContentLoaded', () => {
    cargarPerfil();
});
</script>
</body>
</html>
