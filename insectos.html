<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVO CENTRAL - EXPEDIENTES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --r: #ff0033; 
            --r-dark: #cc0026;
            --r-glow: rgba(255,0,51,0.6);
            --b: #0a0a0a; 
            --p: #1a1a1a; 
            --brd: #2a2a2a; 
            --t: #e0e0e0;
            --t-dim: #888;
            --shadow: 0 16px 48px rgba(0,0,0,0.7);
            --glow: 0 0 30px var(--r-glow);
            --scan: rgba(255,0,51,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: 
                radial-gradient(circle at 15% 85%, var(--r-glow) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(255,0,51,0.08) 0%, transparent 40%),
                linear-gradient(135deg, var(--b) 0%, #120a0a 100%);
            color: var(--t); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            min-height: 100vh;
            position: relative;
            overflow-x: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    var(--scan) 2px,
                    var(--scan) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    var(--scan) 2px,
                    var(--scan) 4px
                );
            animation: scanlines 6s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes scanlines {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }

        .matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            line-height: 1;
            opacity: 0.04;
            z-index: -1;
            animation: matrix-fall 25s linear infinite;
        }

        @keyframes matrix-fall {
            0% { transform: translateY(100vh) skewX(-5deg); }
            100% { transform: translateY(-100vh) skewX(-5deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 25px;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px;
            background: linear-gradient(160deg, rgba(26,26,26,0.9), rgba(10,10,10,0.8));
            border: 2px solid var(--brd);
            border-radius: 24px;
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(120deg, var(--r), #ff4d66, var(--r));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 12px;
            text-transform: uppercase;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--r), transparent);
            border-radius: 2px;
        }

        .header p {
            color: var(--t-dim);
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .search-bar {
            max-width: 500px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(26,26,26,0.8);
            border: 2px solid var(--brd);
            border-radius: 50px;
            color: var(--t);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--r);
            box-shadow: var(--glow);
        }

        .search-input::placeholder {
            color: var(--t-dim);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--t-dim);
        }

        .expedientes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .expediente-card {
            background: linear-gradient(160deg, rgba(26,26,26,0.95), rgba(10,10,10,0.9));
            border: 2px solid var(--brd);
            border-radius: 20px;
            padding: 32px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .expediente-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--r), transparent, var(--r));
            opacity: 0.7;
        }

        .expediente-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--r);
            box-shadow: var(--glow), 0 30px 60px rgba(255,0,51,0.3);
        }

        .expediente-card:active {
            transform: translateY(-8px) scale(1.01);
        }

        .card-id {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(120deg, var(--r), #ff4d66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-name {
            color: var(--t);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .card-meta {
            color: var(--t-dim);
            font-size: 0.95rem;
            margin-bottom: 20px;
            font-family: 'Share Tech Mono', monospace;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tag {
            background: rgba(255,0,51,0.2);
            color: var(--r);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255,0,51,0.4);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .expediente-card:hover .tag {
            background: var(--r);
            color: #fff;
            box-shadow: 0 0 12px var(--r-glow);
        }

        .access-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, var(--r), var(--r-dark));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .access-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .access-btn:hover::before {
            left: 100%;
        }

        .access-btn:hover {
            box-shadow: var(--glow);
            transform: scale(1.05);
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: var(--r);
            border-radius: 50%;
            box-shadow: var(--glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .container { padding: 25px 20px; }
            .expedientes-grid { 
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 25px;
            }
            .expediente-card { padding: 28px 24px; }
            .header { padding: 30px 20px; margin-bottom: 40px; }
        }

        @media (max-width: 480px) {
            .expedientes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg" aria-hidden="true">
        010101 101010 001100 110011 010101 101010 111000 000111 101010 010101
    </div>

    <div class="container">
        <header class="header">
            <h1>ARCHIVO CENTRAL</h1>
            <p>SISTEMA DE EXPEDIENTES CONFIDENCIALES</p>
            
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Buscar expediente por ID o nombre..." 
                       oninput="filterExpedientes(this.value)">
            </div>
        </header>

        <div class="expedientes-grid" id="expedientesGrid">
            <!-- EXPEDIENTE 1 -->
            <div class="expediente-card" onclick="openFolder('expedientes/LOMH870317HGTPRC05/')">
                <div class="status-indicator"></div>
                <div class="card-id">#LOMH870317HGTPRC05</div>
                <div class="card-name">HÉCTOR AGUSTÍN LÓPEZ MÁRTINEZ</div>
                <div class="card-meta">León, Guanajuato | 37 años | TotalPlay/Infinitum</div>
                <div class="card-tags">
                    <span class="tag">MOSCA MUERTA</span>
                    <span class="tag">ALTO RIESGO</span>
                    <span class="tag">OIHEC</span>
                </div>
                <button class="access-btn" onclick="event.stopPropagation(); openFolder('LOMH870317HGTPRC05/')">
                    <i class="fas fa-folder-open"></i> ACCEDER
                </button>
            </div>
    <script>
        function openFolder(folderPath) {
            // Simula apertura de carpeta local
            window.open(folderPath, '_blank');
            // O redirige a página específica:
            // window.location.href = folderPath + 'index.html';
        }

        function filterExpedientes(query) {
            const cards = document.querySelectorAll('.expediente-card');
            const grid = document.getElementById('expedientesGrid');
            
            cards.forEach(card => {
                const id = card.querySelector('.card-id').textContent.toLowerCase();
                const name = card.querySelector('.card-name').textContent.toLowerCase();
                const meta = card.querySelector('.card-meta').textContent.toLowerCase();
                
                if (id.includes(query.toLowerCase()) || 
                    name.includes(query.toLowerCase()) || 
                    meta.includes(query.toLowerCase())) {
                    card.style.display = 'block';
                    card.style.transform = 'scale(1.05)';
                    setTimeout(() => card.style.transform = 'scale(1)', 200);
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Efecto de typing en título
        const title = document.querySelector('.header h1');
        const originalText = title.textContent;
        title.textContent = '';
        let i = 0;
        function typeWriter() {
            if (i < originalText.length) {
                title.textContent += originalText.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        setTimeout(typeWriter, 500);
    </script>
</body>
</html>
