<style>
  body {
    margin: 0;
    padding: 0;
    background: #050505;
    color: #f5f5f5;
    font-family: monospace;
  }

  .wrapper {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 15px;
  }

  .title {
    font-size: 1.8rem;
    color: #ff3333;
    margin-bottom: 5px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 25px;
  }

  /* GRID RESPONSIVE */
  .ally-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 15px;
  }

  /* TARJETA */
  .ally-card {
    background: #0b0b0b;
    border: 1px solid #222;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ally-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ally-img {
    width: 42px;
    height: 42px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid #ff3333;
  }

  .ally-name {
    font-size: 1rem;
    color: #ff3333;
  }

  .ally-desc {
    font-size: 0.82rem;
    color: #c0c0c0;
    line-height: 1.2rem;
  }

  .ally-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ally-tag {
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid #ff3333;
    color: #ff6666;
  }

  .ally-btn {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid #ff3333;
    background: transparent;
    color: #ff6666;
    cursor: pointer;
  }

  .ally-btn:hover {
    background: #ff3333;
    color: #000;
  }

  /* AJUSTES PARA CELULAR */
  @media (max-width: 480px) {

    .title {
      font-size: 1.4rem;
    }

    .ally-grid {
      grid-template-columns: 1fr; /* UNA tarjeta por fila */
    }

    .ally-img {
      width: 36px;
      height: 36px;
    }

    .ally-name {
      font-size: 0.9rem;
    }

    .ally-desc {
      font-size: 0.75rem;
    }

    .ally-btn {
      font-size: 0.65rem;
      padding: 3px 6px;
    }
  }

  .back {
    margin-top: 25px;
  }

  .back a {
    color: #ff3333;
    text-decoration: none;
    border-bottom: 1px solid #ff3333;
    font-size: 0.85rem;
  }
</style>

</head>
