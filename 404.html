<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>404 - TEAM JXLL</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    color: red;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  /* Logo girando sin moverse */
  .logo {
    width: 150px;
    height: 150px;
    object-fit: contain;
    animation: spin 2s linear infinite;
    margin-bottom: 30px;
    transform-origin: center center; /* asegura que gire sin desplazarse */
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Texto 404 */
  h1 {
    font-size: 8rem;
    margin: 0;
    text-shadow: 0 0 20px red;
  }

  /* Texto editable */
  p {
    font-size: 1.8rem;
    margin-top: 20px;
    color: #ff4444;
    text-shadow: 0 0 10px red;
    max-width: 800px;
  }
</style>

</head>
<body>

  <!-- Logo girando sin moverse -->
  <img src="favicon.png" class="logo">

  <!-- Texto 404 -->
  <h1>404</h1>

  <!-- MENSAJE EDITABLE -->
  <p>
    Que mierda estas buscando aqui eres idiota o que, deja de buscar atencion y devuelvete a tu patetica y insignificante vida
  </p>

</body>
</html>
