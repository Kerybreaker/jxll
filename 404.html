<title>404 - TEAM JXLL</title>

<style>

/* ========================= */
/* ====== LOADER CSS ======= */
/* ========================= */

#loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo-container {
  width: 160px;
  height: 160px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo-spin {
  width: 130px;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loading-bar {
  width: 55%;
  height: 6px;
  background: #222;
  margin-top: 35px;
  border-radius: 4px;
  overflow: hidden;
}

.loading-progress {
  width: 0%;
  height: 100%;
  background: red;
  animation: load 2.5s ease-in-out forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

.fade-out {
  opacity: 0;
  transition: opacity 0.6s ease-out;
  pointer-events: none;
}

/* ========================= */
/* ====== PÁGINA 404 ======= */
/* ========================= */

body {
  margin: 0;
  padding: 0;
  background: black;
  color: red;
  font-family: monospace;
  text-align: center;
  overflow-x: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Logo */
.logo {
  width: 140px;
  height: 140px;
  object-fit: contain;
  animation: spin 2s linear infinite;
  margin-bottom: 25px;
}

/* Glitch 404 */
.glitch {
  font-size: 7rem;
  font-weight: bold;
  position: relative;
  text-shadow: 0 0 20px red;
}

.glitch::before,
.glitch::after {
  content: "404";
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0.7;
}

.glitch::before {
  color: #ff3333;
  animation: glitch1 0.8s infinite;
}

.glitch::after {
  color: #ff0000;
  animation: glitch2 0.8s infinite;
}

@keyframes glitch1 {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(2px, -2px); }
}

@keyframes glitch2 {
  0% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -2px); }
  100% { transform: translate(-2px, 2px); }
}

/* Texto */
.message {
  font-size: 1.4rem;
  color: #ff4444;
  max-width: 700px;
  margin-top: 20px;
  text-shadow: 0 0 10px red;
  line-height: 1.7rem;
}

/* Responsive */
@media (max-width: 600px) {
  .glitch { font-size: 4.5rem; }
  .logo { width: 110px; height: 110px; }
  .message { font-size: 1.1rem; padding: 0 10px; }
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="logo-container">
    <img src="favicon.png" class="logo-spin">
  </div>

  <div class="loading-bar">
    <div class="loading-progress"></div>
  </div>
</div>

<!-- CONTENIDO REAL -->
<div class="container">
  <img src="favicon.png" class="logo">

  <div class="glitch">404</div>

  <p class="message">
    No deberías estar aquí.  
    Este nodo no existe o fue eliminado.  
    Regresa antes de que el sistema registre tu presencia.
  </p>
</div>

<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loader");
  loader.classList.add("fade-out");

  setTimeout(() => {
    loader.style.display = "none";
  }, 600);
});
</script>

</body>
</html>
