<!DOCTYPE html>
<html>
<head>
   <script>
  document.addEventListener('keydown', function(e) {
    // Detecta Ctrl + U
    if (e.ctrlKey && e.key.toLowerCase() === 'u') {
      e.preventDefault(); // Evita que se abra el código fuente
      window.location.href = "panel.html"; // Cambia por tu link
    }
  });
</script>
 <title>¡JAJAJA! ¡CAÍSTE!</title>
    <style>
        :root {
            --red: #8B0000;
            --red-neon: #FF0000;
            --red-mid: #CC0000;
            --smoke: #2C2C2C;
            --offwhite: #E0E0E0;
            --black: #000000;
        }
        
        body {
            background: var(--black);
            color: var(--red-neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            text-align: center;
        }
        
        .container {
            position: relative;
            padding: 20px;
            border: 3px solid var(--red-neon);
            margin: 50px auto;
            width: 80%;
            box-shadow: 0 0 20px var(--red-neon);
            animation: glitch 1s infinite;
        }
        
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px var(--red-neon);
            margin-bottom: 30px;
            letter-spacing: 5px;
        }
        
        p {
            font-size: 1.5em;
            line-height: 1.6;
        }
        
        .team-name {
            color: var(--offwhite);
            font-size: 4em;
            font-weight: bold;
            text-shadow: 
                0 0 10px var(--red-neon),
                0 0 20px var(--red-mid),
                0 0 30px var(--red);
            margin: 30px 0;
            animation: flicker 0.5s infinite alternate;
        }
        
        .warning {
            color: var(--offwhite);
            border-top: 1px dashed var(--red-neon);
            padding-top: 20px;
            margin-top: 40px;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }
        
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
            }
            20%, 22%, 24%, 55% {
                opacity: 0.5;
            }
        }
        
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <canvas id="matrix" class="matrix-rain"></canvas>
    
    <div class="container">
        <h1>¡ACCESO DENEGADO!</h1>
        <p>Has sido <span style="color: var(--red-neon)">ENGÑADO</span>.</p>
        <p>Este panel de administración era una <span style="color: var(--red-mid)">TRAMPA</span>.</p>
        
        <div class="team-name">TEAM JXLL</div>
        
        <p>Tus credenciales han sido <span style="text-decoration: line-through;">robadas</span> registradas.</p>
        <p style="font-size: 0.8em;">(No, en realidad no... o sí?)</p>
        
        <div class="warning">
            <p>¡Gracias por hacer nuestro honeypot más creíble!</p>
            <p>IP registrada: <span id="ip">cargando...</span></p>
        </div>
    </div>

    <script>
        // Mostrar IP (usando ipify)
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').textContent = data.ip;
            })
            .catch(() => {
                document.getElementById('ip').textContent = '127.0.0.1';
            });

        // Efecto Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        
        const alphabet = katakana + latin + nums;
        
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        
        const rainDrops = [];
        
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }
        
        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = var(--red-neon);
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillStyle = `rgba(${Math.floor(Math.random() * 100 + 155)}, 0, 0, ${Math.random()})`;
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };
        
        setInterval(draw, 30);
    </script>
</body>
</html>
